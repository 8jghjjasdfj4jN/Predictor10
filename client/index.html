<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta
      name="description"
      content="Predictor10 is a premium mobile-first football score prediction app concept for weekly Premier League rounds, league competition, leaderboards, and payment-ready entries."
    />
    <meta name="theme-color" content="#0B1F14" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Predictor10</title>

    <!--
      Boot-time error reporter (step 2r, tightened in step 2t).
      - Uses capture-phase listener so script-load failures are caught
        (those events don't bubble to window).
      - Reads main.tsx checkpoints (__p10_bootStarted / __p10_renderStarted /
        __p10_renderReturned) so the diagnostic says HOW FAR boot got, not just
        "nothing happened".
      No-op on healthy boots (mount check short-circuits the fallback).
    -->
    <script>
      (function () {
        var FALLBACK_DELAY_MS = 200;
        var SAFETY_NET_MS = 10000;
        var errors = [];
        var rendered = false;

        function rootEl() {
          return document.getElementById("root");
        }

        function rootHasChildren() {
          var r = rootEl();
          return !!(r && r.children && r.children.length > 0);
        }

        function escapeHtml(s) {
          return String(s).replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }

        function bootStatus() {
          var w = window;
          return (
            "bootStarted=" + (w.__p10_bootStarted === true) +
            ", renderStarted=" + (w.__p10_renderStarted === true) +
            ", renderReturned=" + (w.__p10_renderReturned === true)
          );
        }

        function safetyNetExplanation() {
          var w = window;
          var secs = SAFETY_NET_MS / 1000;
          if (w.__p10_renderReturned === true) {
            return (
              "App reached the end of createRoot.render() but #root is still empty after " +
              secs +
              " seconds. The initial render produced no output, or something replaced the root."
            );
          }
          if (w.__p10_renderStarted === true) {
            return (
              "App reached createRoot.render() but it didn't complete within " +
              secs +
              " seconds. The render call may have thrown or hung."
            );
          }
          if (w.__p10_bootStarted === true) {
            return (
              "main.tsx started executing but never reached createRoot.render(). An import or module-level statement is failing silently."
            );
          }
          return (
            "main.tsx never executed within " +
            secs +
            " seconds. The bundle either failed to load (404, network, CORS, content-security-policy) or hasn't finished parsing yet."
          );
        }

        function fallbackCopy(text, done) {
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "absolute";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            done();
          } catch (e) {
            /* clipboard unavailable - give up silently */
          }
        }

        function renderFallback() {
          if (rendered) return;
          if (rootHasChildren()) return;
          var r = rootEl();
          if (!r) return;
          rendered = true;

          var body = errors.length ? errors.join("\n\n") : safetyNetExplanation();
          var detail = body + "\n\n[boot] " + bootStatus();

          var wrapStyle = [
            "min-height:100vh",
            "background:#0B1F14",
            "color:#E6F4EC",
            "padding:24px 20px",
            "font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif",
            "box-sizing:border-box",
            "padding-top:max(24px,env(safe-area-inset-top))",
            "padding-bottom:max(24px,env(safe-area-inset-bottom))",
          ].join(";");

          var btnPrimary =
            "background:#10B981;color:#0B1F14;border:0;padding:0 18px;height:48px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;min-width:120px;font-family:inherit;";
          var btnSecondary =
            "background:transparent;color:#E6F4EC;border:1px solid #2A4A36;padding:0 18px;height:48px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;min-width:120px;font-family:inherit;";

          var html =
            '<div style="' + wrapStyle + '">' +
            '<div style="max-width:480px;margin:0 auto;">' +
            '<h1 style="font-size:20px;margin:0 0 8px;font-weight:700;letter-spacing:-0.01em;">Predictor10 couldn\'t start</h1>' +
            '<p style="margin:0 0 20px;color:#A8C8B6;font-size:14px;line-height:1.5;">Something went wrong before the app could load. Tap Reload to try again. If it keeps happening, tap Copy details and share them with support.</p>' +
            '<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">' +
            '<button id="p10-fallback-reload" type="button" style="' + btnPrimary + '">Reload</button>' +
            '<button id="p10-fallback-copy" type="button" style="' + btnSecondary + '">Copy details</button>' +
            "</div>" +
            '<div style="font-size:12px;color:#7FA690;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;">Diagnostic</div>' +
            '<pre style="background:#0A1A11;border:1px solid #1F3A29;color:#D5E8DD;padding:12px;border-radius:8px;font-size:12px;line-height:1.5;overflow:auto;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;margin:0;max-height:50vh;">' +
            escapeHtml(detail) +
            "</pre>" +
            '<p style="margin:16px 0 0;font-size:11px;color:#5A8070;line-height:1.5;word-break:break-word;">' +
            '<span style="color:#7FA690;">UA:</span> ' + escapeHtml(navigator.userAgent || "unknown") +
            '<br/><span style="color:#7FA690;">URL:</span> ' + escapeHtml(location.href) +
            '<br/><span style="color:#7FA690;">Time:</span> ' + escapeHtml(new Date().toISOString()) +
            "</p>" +
            "</div></div>";

          r.innerHTML = html;

          var reloadBtn = document.getElementById("p10-fallback-reload");
          if (reloadBtn) {
            reloadBtn.addEventListener("click", function () {
              location.reload();
            });
          }

          var copyBtn = document.getElementById("p10-fallback-copy");
          if (copyBtn) {
            copyBtn.addEventListener("click", function () {
              var text =
                detail +
                "\n\nUA: " + (navigator.userAgent || "unknown") +
                "\nURL: " + location.href +
                "\nTime: " + new Date().toISOString();
              var done = function () {
                copyBtn.textContent = "Copied";
                setTimeout(function () {
                  copyBtn.textContent = "Copy details";
                }, 1800);
              };
              try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                  navigator.clipboard.writeText(text).then(done, function () {
                    fallbackCopy(text, done);
                  });
                } else {
                  fallbackCopy(text, done);
                }
              } catch (e) {
                fallbackCopy(text, done);
              }
            });
          }
        }

        function record(label, detail) {
          var entry = "[" + new Date().toISOString() + "] " + label + "\n" + detail;
          errors.push(entry);
          try {
            console.error("[p10-boot]", entry);
          } catch (e) {
            /* console unavailable - ignore */
          }
          setTimeout(function () {
            if (!rootHasChildren()) renderFallback();
          }, FALLBACK_DELAY_MS);
        }

        // Capture phase = catches resource-load failures (<script>, <link>, <img>)
        // that don't bubble to window. Also catches runtime errors targeted at window
        // (capture listeners on window fire for window-targeted events too).
        window.addEventListener(
          "error",
          function (e) {
            // Resource load error: target is a DOM element, not window
            if (e && e.target && e.target !== window && e.target.nodeType === 1) {
              var t = e.target;
              var url = t.src || t.href || "(unknown)";
              var tag = (t.tagName || "?").toLowerCase();
              record("resource load failed", "<" + tag + "> " + url);
              return;
            }
            // Runtime JS error
            var msg = (e && e.message) || "Unknown error";
            var src = "";
            if (e && e.filename) {
              src = "\n  at " + e.filename + ":" + (e.lineno || "?") + ":" + (e.colno || "?");
            }
            var stk = e && e.error && e.error.stack ? "\n" + e.error.stack : "";
            record("window.error", msg + src + stk);
          },
          true
        );

        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason;
          var msg = r ? r.message || String(r) : "Unknown rejection";
          var stk = r && r.stack ? "\n" + r.stack : "";
          record("unhandledrejection", msg + stk);
        });

        // Safety net: render an explanatory message if React never mounted and no
        // errors were captured (silent mount failure: blocked bundle, CSP, etc.).
        setTimeout(function () {
          if (!rootHasChildren() && errors.length === 0) {
            renderFallback();
          }
        }, SAFETY_NET_MS);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
